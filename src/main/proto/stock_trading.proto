
syntax = "proto3";

package stocktrading;
option  java_multiple_files=true;
option java_package="com.javatechie.grpc";
option  java_outer_classname="StockTradingProto";


service StockTradingService{

  // UNARY - RPC -> get current stock price
  rpc getStockPrice(StockRequest) returns (StockResponse);

  //server streaming

  rpc subscribeStockService(StockRequest) returns (stream StockResponse);

  //client streaming

  rpc bulkStockOrder(stream StockOrder) returns (OrderSummary);

}


message StockRequest{
  string stock_symbol=1;
}

message StockResponse{
  string stock_symbol=1;
  double price=2;
  string timestamp=3;

}

message StockOrder{
  int32 order_id=1;
  string stockSymbol=2;
  double price=3;
  string order_Type=4;
  int32 quantity=5;
}

message OrderSummary{
  int32 total_orders=1;
  double total_amount=2;
  int32 success_count=3;

}